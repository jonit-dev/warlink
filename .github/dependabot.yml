version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    groups:
      javascript:
        patterns:
          - "*"
  - package-ecosystem: gomod
    directory: /apps/agent
    schedule:
      interval: monthly
  - package-ecosystem: gomod
    directory: /apps/desktop
    schedule:
      interval: monthly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
