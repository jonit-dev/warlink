name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  javascript:
    name: TypeScript workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build

  go:
    name: Go workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache-dependency-path: |
            apps/agent/go.sum
            apps/desktop/go.sum
      - run: test -z "$(gofmt -l apps/agent apps/desktop)"
      - run: go vet ./apps/agent/... ./apps/desktop/...
      - run: go test -race ./apps/agent/... ./apps/desktop/...
